name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aliyun-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate application
        run: |
          python -m py_compile app.py
          python - <<'PY'
          from app import app

          client = app.test_client()
          assert client.get('/health').status_code == 200
          assert client.get('/h5/').status_code == 200
          PY

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: ${{ secrets.ALIYUN_HOST }}
      SSH_PORT: ${{ secrets.ALIYUN_SSH_PORT }}
      SSH_USER: ${{ secrets.ALIYUN_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.ALIYUN_SSH_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
      SERVICE_NAME: ${{ secrets.ALIYUN_SERVICE_NAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -Eeuo pipefail
          : "${SSH_HOST:?ALIYUN_HOST is required}"
          : "${SSH_USER:?ALIYUN_USER is required}"
          : "${SSH_PRIVATE_KEY:?ALIYUN_SSH_PRIVATE_KEY is required}"
          : "${SSH_KNOWN_HOSTS:?ALIYUN_SSH_KNOWN_HOSTS is required}"
          : "${DEPLOY_PATH:?ALIYUN_DEPLOY_PATH is required}"

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Deploy exact commit
        shell: bash
        env:
          TARGET_SHA: ${{ github.sha }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          SERVICE_NAME="${SERVICE_NAME:-tgxx-portal}"
          printf -v REMOTE_COMMAND 'bash -s -- %q %q %q %q' \
            "$DEPLOY_PATH" "$TARGET_SHA" "$DEPLOY_BRANCH" "$SERVICE_NAME"
          ssh -i ~/.ssh/id_ed25519 \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "$REMOTE_COMMAND" < deploy/remote-deploy.sh
